services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: asistenciaugel_app
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asistenciaugel_network

  db:
    image: postgres:15
    container_name: asistenciaugel_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: asistenciaugel
      POSTGRES_USER: asistenciaugel_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CambiaEstaPassword2024!}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - asistenciaugel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asistenciaugel_user -d asistenciaugel"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  asistenciaugel_network:
    driver: bridge

volumes:
  db-data:
